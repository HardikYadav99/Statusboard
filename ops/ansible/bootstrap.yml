---
- name: Bootstrap VPS
  hosts: prod
  become: true

  tasks:
    # Task 1: update the local package list
    - name: Update apt Cache
      apt:
        update_cache: true      # Fixed: removed the 'h' from chache
        cache_valid_time: 3600
      
    # Task 2: Install tools for managing HTTP repositories 
    - name: installing base packages needed for docker repo
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    # Task 3: Prepare folders for security keys
    - name: Create Keyrings directory 
      file:
        path: /etc/apt/keyrings # Fixed: removed extra 'y' from keyyrings
        state: directory
        mode: "0755"

    # Task 4: download the official docker security key
    - name: Download docker GPG Key 
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"            # Fixed: added quotes for consistency
        force: true

    # Task 5: Add Docker's Official server to our source list 
    - name: Putting Docker official server to the source list 
      apt_repository:
        repo: >-                # Fixed: indented this line 2 spaces forward
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_facts['distribution_release'] }} stable
        state: present
        filename: docker

    # Task 6: refresh the source list again
    - name: Update apt cache after adding docker repo
      apt: 
        update_cache: true

    # Task 7: Install actual docker software
    - name: Install docker Engine and Compose Plugin 
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    # Task 8: Make sure docker start automatically 
    - name: Ensure docker services is running and enabled
      service:                 
        name: docker
        state: started         
        enabled: true

    #9 ensuring shared network exist 
    - name: Ensure shared network exist
      docker_network:
        name: shared-network
        state: present

    # Task 9: Create the landing zone for our project
    - name: Create app directory (/opt/statusboard)
      file:
        path: /opt/statusboard
        state: directory
        mode: "0755"