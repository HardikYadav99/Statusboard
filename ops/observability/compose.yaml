services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: statusboard-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro 
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - shared-network  # FIXED: Use a list format here

  grafana:
    image: grafana/grafana:11.2.0
    container_name: statusboard-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - shared-network  # FIXED

  node-exporter:  # Recommendation: Use hyphens here too
    image: prom/node-exporter:v1.8.2
    container_name: statusboard-node-exporter
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - "/:/host:ro,rslave"
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - shared-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: statusboard-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    networks:
      - shared-network
    
  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    container_name: statusboard-blackbox
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    ports:
      - "9115:9115"
    restart: unless-stopped
    networks:
      - shared-network

volumes:
  grafana_data:

# NEW SECTION: This is where you tell Docker about the shared network
networks:
  shared-network:
    external: true